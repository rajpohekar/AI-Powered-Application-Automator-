version: '3.8'

services:
  # Node.js API Gateway
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: job_autofill_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/job-autofill-assistant
      - JWT_SECRET=supersecretjwttokenchangeinprod
      - AI_SERVICE_URL=http://ai-service:8000
      - NODE_ENV=development
    depends_on:
      - mongodb
      - ai-service
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - autofill-network

  # Python FastAPI RAG Service
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: job_autofill_ai_service
    ports:
      - "8000:8000"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OPENAI_API_KEY=your_openai_api_key_here
      - COHERE_API_KEY=your_cohere_api_key_here
      - PORT=8000
    depends_on:
      - qdrant
    volumes:
      - ./ai-service:/app
    networks:
      - autofill-network

  # Vector Database (Qdrant)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: job_autofill_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - autofill-network

  # Relational / Document database (MongoDB)
  mongodb:
    image: mongo:latest
    container_name: job_autofill_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - autofill-network

volumes:
  mongo_data:
  qdrant_data:

networks:
  autofill-network:
    driver: bridge
